<!DOCTYPE html>
<html>

<head>

    <title>Fiverr Scam Detector</title>

    <style>

        body{
            width:320px;
            padding:20px;
            font-family:Arial;
            background:#f5f5f5;
        }

        h2{
            text-align:center;
            color:#1dbf73;
        }

        textarea{
            width:100%;
            height:120px;
            padding:10px;
            border-radius:8px;
            border:1px solid #ccc;
            resize:none;
            font-size:14px;
        }

        button{
            margin-top:15px;
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#1dbf73;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            opacity:0.9;
        }

        #result{
            margin-top:20px;
            padding:12px;
            border-radius:8px;
            background:white;
            font-weight:bold;
            text-align:center;
            box-shadow:0 0 5px rgba(0,0,0,0.1);
        }

    </style>

</head>

<body>

    <h2>Fiverr Scam Detector</h2>

    <textarea
    id="message"
    placeholder="Paste Fiverr message here">
    </textarea>

    <button id="checkBtn">
        Analyze Message
    </button>

    <div id="result">
        Waiting for analysis...
    </div>

    <script src="popup.js"></script>

</body>

</html>
